name: Build & Publish Debian Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - sshpilot_release_published

jobs:
  build-and-publish:
    permissions:
      pages: write
      contents: write
    environment: Main
    runs-on: ubuntu-latest
    env:
      DISTRIBUTION: any
      COMPONENT: main
      # The package is Architecture: all, but apt fetches dists/*/binary-$(dpkg
      # --print-architecture)/Packages -- so listing only amd64 left every arm64
      # machine with a 404 on a package that would have run there fine. reprepro
      # copies an arch:all package into each architecture's index.
      ARCHITECTURE: amd64 arm64
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      KEY_ID: ${{ secrets.KEY_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Show trigger context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Dispatched tag: ${{ github.event.client_payload.tag || 'n/a' }}"
          echo "Dispatched release URL: ${{ github.event.client_payload.release_html_url || 'n/a' }}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro dpkg-dev curl jq gnupg debsigs

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr:' | head -n1 | cut -d: -f10)
          echo "$FINGERPRINT:6:" | gpg --batch --import-ownertrust

      - name: Determine target sshpilot version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.tag }}" ]; then
            TAG="${{ github.event.client_payload.tag }}"
            echo "Using tag from repository_dispatch payload: $TAG"
          else
            TAG=$(curl -s https://api.github.com/repos/mfat/sshpilot/releases/latest | jq -r '.tag_name')
            echo "Using latest release tag: $TAG"
          fi
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download target sshpilot binary
        run: |
          RELEASE_API_URL="https://api.github.com/repos/mfat/sshpilot/releases/tags/${{ steps.get-version.outputs.tag }}"
          if [ "${{ github.event_name }}" != "repository_dispatch" ]; then
            RELEASE_API_URL="https://api.github.com/repos/mfat/sshpilot/releases/latest"
          fi
          DOWNLOAD_URL=$(curl -s "$RELEASE_API_URL" | jq -r '.assets[] | select(.name | endswith("_all.deb")) | .browser_download_url')
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: Could not find a .deb package in the selected release"
            echo "Available assets:"
            curl -s "$RELEASE_API_URL" | jq -r '.assets[].name'
            exit 1
          fi
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o sshpilot.deb

      - name: Sign Debian package
        run: |
          debsigs -v --gpgopts="--batch --no-tty --pinentry-mode=loopback" --sign=origin --default-key="$KEY_ID" sshpilot.deb

      - name: Create APT repository with reprepro
        run: |
          mkdir -p repo/conf
          echo "Origin: GitHub" >repo/conf/distributions
          echo "Label: GitHub SSH Pilot" >>repo/conf/distributions
          echo "Suite: stable" >>repo/conf/distributions
          echo "Codename: ${DISTRIBUTION}" >>repo/conf/distributions
          echo "Components: ${COMPONENT}" >>repo/conf/distributions
          echo "Architectures: ${ARCHITECTURE}" >>repo/conf/distributions
          echo "SignWith: $KEY_ID" >>repo/conf/distributions
          reprepro -Vb repo includedeb ${DISTRIBUTION} sshpilot.deb
          cp pubkey.gpg repo/pubkey.gpg
          cp index.html repo/

      - name: Deploy APT repository to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo

